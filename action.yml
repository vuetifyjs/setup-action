name: Setup
description: Restore node_modules and cache, then run pnpm install

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version-file: '.nvmrc'
    - run: pnpm i --frozen-lockfile
      shell: bash
